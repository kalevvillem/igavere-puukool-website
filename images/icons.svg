    <path d="M7 14h10v6H7z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
    <circle cx="17.3" cy="11.2" r="1" fill="currentColor"/>
  </symbol>
  <symbol id="icon-height" viewBox="0 0 24 24">
