  </symbol>
  <symbol id="icon-flower" viewBox="0 0 24 24">
    <path d="M12 12c3 0 5.5 2.5 5.5 5.5-3 0-5.5-2.5-5.5-5.5Zm0 0c0-3 2.5-5.5 5.5-5.5 0 3-2.5 5.5-5.5 5.5Zm0 0c-3 0-5.5-2.5-5.5-5.5 3 0 5.5 2.5 5.5 5.5Zm0 0c0 3-2.5 5.5-5.5 5.5 0-3 2.5-5.5 5.5-5.5Z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
    <circle cx="12" cy="12" r="1.7" fill="currentColor"/>
  </symbol>
  <symbol id="icon-soil" viewBox="0 0 24 24">
    <path d="M3 18h18M5 14h14M7 10h10" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
  </symbol>
  <symbol id="icon-sun" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.7"/>
