<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="icon-landscape" viewBox="0 0 24 24">
    <!-- ground -->
    <path d="M1 20h22" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round"/>
    <!-- house walls -->
    <path d="M3 20v-8h10v8" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- roof -->
    <path d="M1 12l7-7 7 7" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- door -->
    <path d="M6.5 20v-4h3v4" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- tree trunk -->
    <path d="M19 20v-6" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round"/>
    <!-- tree canopy -->
    <circle cx="19" cy="11" r="3.2" fill="none" stroke="currentColor" stroke-width="1.55"/>
  </symbol>
  <symbol id="icon-design" viewBox="0 0 24 24">
    <!-- page with folded corner -->
    <path d="M4 3h12l4 5v13H4z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- fold -->
    <path d="M16 3v5h4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- floor plan lines inside -->
    <path d="M7 11h10v8H7z" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M7 15h5M12 11v4" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"/>
  </symbol>
  <symbol id="icon-nursery" viewBox="0 0 24 24">
    <!-- pot rim -->
    <path d="M6 14h12" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round"/>
    <!-- pot body -->
    <path d="M8 14l1 6h6l1-6" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- stem -->
    <path d="M12 14V8" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round"/>
    <!-- left leaf -->
    <path d="M12 10c0-3-3-4.5-4.5-2.5 1.5 2 4.5 2.5 4.5 2.5z" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- right leaf -->
    <path d="M12 10c0-3 3-4.5 4.5-2.5-1.5 2-4.5 2.5-4.5 2.5z" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>
  <symbol id="icon-phone" viewBox="0 0 24 24">
    <path d="M6 3h4l2 5-2.5 2.5a14 14 0 0 0 4 4L16 12l5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 5a2 2 0 0 1 2-2Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>
  <symbol id="icon-mail" viewBox="0 0 24 24">
    <path d="M3 6h18v12H3zM3 7l9 7 9-7" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>
  <symbol id="icon-map" viewBox="0 0 24 24">
