    <path d="M3 10h18M8 3v4M16 3v4" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
  </symbol>
  <symbol id="icon-facebook" viewBox="0 0 24 24">
    <path d="M13.5 22v-8h2.7l.5-3h-3.2V9.3c0-.9.3-1.5 1.7-1.5h1.6V5.1c-.3 0-1.2-.1-2.3-.1-2.3 0-3.9 1.4-3.9 3.9V11H8v3h2.6v8h2.9Z" fill="currentColor"/>
